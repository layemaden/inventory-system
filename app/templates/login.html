<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Inventory System</h1>
            <p class="text-gray-600 mt-2">Sign in to continue</p>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <!-- Tab buttons -->
            <div class="flex border-b">
                <button onclick="showTab('pin')" id="pin-tab" class="flex-1 py-3 px-4 text-center font-medium bg-blue-50 text-blue-600 border-b-2 border-blue-600">
                    Staff PIN
                </button>
                <button onclick="showTab('admin')" id="admin-tab" class="flex-1 py-3 px-4 text-center font-medium text-gray-600 hover:bg-gray-50">
                    Admin Login
                </button>
            </div>

            <!-- PIN Login -->
            <div id="pin-form" class="p-6">
                <form method="post" action="/auth/login/pin">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2">Enter your PIN</label>
                        <input type="password" name="pin" inputmode="numeric" pattern="[0-9]*"
                               class="w-full px-4 py-3 text-2xl text-center tracking-widest border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="****" maxlength="6" required autofocus>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                        Sign In
                    </button>
                </form>
            </div>

            <!-- Admin Login -->
            <div id="admin-form" class="p-6 hidden">
                <form method="post" action="/auth/login/password">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2">Username</label>
                        <input type="text" name="username"
                               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
                        <input type="password" name="password"
                               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                        Sign In
                    </button>
                </form>
            </div>
        </div>

        <p class="text-center text-gray-500 text-sm mt-4">
            Default admin: admin / admin123<br>
            Default staff PIN: 1234
        </p>
    </div>

    <script>
        function showTab(tab) {
            const pinForm = document.getElementById('pin-form');
            const adminForm = document.getElementById('admin-form');
            const pinTab = document.getElementById('pin-tab');
            const adminTab = document.getElementById('admin-tab');

            if (tab === 'pin') {
                pinForm.classList.remove('hidden');
                adminForm.classList.add('hidden');
                pinTab.classList.add('bg-blue-50', 'text-blue-600', 'border-b-2', 'border-blue-600');
                pinTab.classList.remove('text-gray-600');
                adminTab.classList.remove('bg-blue-50', 'text-blue-600', 'border-b-2', 'border-blue-600');
                adminTab.classList.add('text-gray-600');
            } else {
                pinForm.classList.add('hidden');
                adminForm.classList.remove('hidden');
                adminTab.classList.add('bg-blue-50', 'text-blue-600', 'border-b-2', 'border-blue-600');
                adminTab.classList.remove('text-gray-600');
                pinTab.classList.remove('bg-blue-50', 'text-blue-600', 'border-b-2', 'border-blue-600');
                pinTab.classList.add('text-gray-600');
            }
        }

        {% if show_admin %}
        showTab('admin');
        {% endif %}
    </script>
</body>
</html>

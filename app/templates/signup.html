<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Inventory System</h1>
            <p class="text-gray-600 mt-2">Create your staff account</p>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <div class="bg-white rounded-lg shadow-md p-6">
            <form method="post" action="/auth/signup" id="signup-form">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">Username</label>
                    <input type="text" name="username"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Choose a username" required autofocus
                           minlength="3" maxlength="50">
                    <p class="text-gray-500 text-xs mt-1">3-50 characters</p>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2">Create PIN</label>
                    <input type="password" name="pin" id="pin" inputmode="numeric" pattern="[0-9]*"
                           class="w-full px-4 py-3 text-xl text-center tracking-widest border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="****" minlength="4" maxlength="6" required>
                    <p class="text-gray-500 text-xs mt-1">4-6 digit PIN</p>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-medium mb-2">Confirm PIN</label>
                    <input type="password" name="confirm_pin" id="confirm_pin" inputmode="numeric" pattern="[0-9]*"
                           class="w-full px-4 py-3 text-xl text-center tracking-widest border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="****" minlength="4" maxlength="6" required>
                    <p class="text-red-500 text-xs mt-1 hidden" id="pin-error">PINs do not match</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                    Create Account
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-gray-600 text-sm">
                    Already have an account?
                    <a href="/auth/login" class="text-blue-600 hover:underline font-medium">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const pin = document.getElementById('pin');
        const confirmPin = document.getElementById('confirm_pin');
        const pinError = document.getElementById('pin-error');
        const form = document.getElementById('signup-form');

        function validatePins() {
            if (confirmPin.value && pin.value !== confirmPin.value) {
                pinError.classList.remove('hidden');
                confirmPin.classList.add('border-red-500');
                return false;
            } else {
                pinError.classList.add('hidden');
                confirmPin.classList.remove('border-red-500');
                return true;
            }
        }

        pin.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            validatePins();
        });

        confirmPin.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            validatePins();
        });

        form.addEventListener('submit', function(e) {
            if (!validatePins()) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
